# #######################################################################################
# HYPRLAND CONFIG
# #######################################################################################
 
# autogenerated = 1 # remove this line to remove the warning
 
 
################
### MONITORS ###
################
 
monitor = DP-2, 2560x1440@239.96, 0x0, 1
monitor = DP-3, 1920x1200@74.92, 2560x0, 1
 
 
###################
### MY PROGRAMS ###
###################
 
$terminal    = kitty
$fileManager = $terminal -e yazi
$menu        = ~/.config/rofi/launchers/type-1/launcher.sh &
$browser     = firefox

 
#################
### AUTOSTART ###
#################
 
exec-once = waybar & hyprpaper
exec-once = easyeffects --gapplication-service
exec-once = sleep 2 && hyprshell run
# exec-once = nextcloud
exec = hyprshade on vibrance2
# Clipboard history daemon
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start swayosd 
 
#############################
### ENVIRONMENT VARIABLES ###
#############################
 
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
 
 
#####################
### LOOK AND FEEL ###
#####################
 
general {
    gaps_in  = 3
    gaps_out = 6
 
    border_size = 2
 
    col.active_border   = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(313244ee)
 
    resize_on_border = true   # drag window edges/gaps to resize
 
    # Tearing enabled globally, applied per-window below
    allow_tearing = true
 
    layout = dwindle
}
 
decoration {
    rounding       = 4
    rounding_power = 2
 
    active_opacity   = 1
    inactive_opacity = 0.95
 
    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }
 
    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }
}
 
animations {
    enabled = yes, please :)
 
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
 
    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}
 
dwindle {
    pseudotile    = true
    preserve_split = true
}
 
master {
    new_status = master
}
 
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = false
 
    # Reduces GPU usage when windows are idle
    vfr = true
 
    # Terminal disappears when launching a GUI app from it
    enable_swallow = true
    swallow_regex  = ^(kitty|alacritty)$
}
 
 
#############
### INPUT ###
#############
 
input {
    kb_layout = no
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
 
    follow_mouse = 0
 
    sensitivity    = 0
#    force_no_accel = 1
#    accel_profile  = flat
 
    touchpad {
        natural_scroll = false
    }
}
 
cursor {
    inactive_timeout   = 0
    no_hardware_cursors = true
}
 
gesture = 3, horizontal, workspace
 
device {
    name        = logitech-usb-receiver
    sensitivity = -0.5
    accel_profile = flat
}
 
 
###################
### KEYBINDINGS ###
###################
 
$mainMod = SUPER
 
bind = $mainMod, Return,   exec, $terminal
bind = $mainMod, B,        exec, $browser
bind = $mainMod, Q,        killactive,
bind = ALT,      Tab,      exec, hyprshell switch
bind = ALT SHIFT,Tab,      exec, hyprshell switch -r
bindr = ALT,     ALT_L,    exec, hyprshell close
bind = $mainMod, F,        exec, nautilus
bind = $mainMod SHIFT, F,  exec, $fileManager
bind = $mainMod, V,        togglefloating,
bind = $mainMod, Space,    exec, $menu
bind = SUPER,    S,        exec, hyprshot -m region -o ~/Pictures/Screenshots -c
bind = SUPER SHIFT, S,     exec, hyprshot -m window -o ~/Pictures/Screenshots -c
bind = ALT,      S,        exec, hyprshot -m output -o ~/Pictures/Screenshots -c
bind = $mainMod SHIFT, P,  exec, hyprpicker
bind = $mainMod, P,        pseudo,
bind = $mainMod, J,        togglesplit,
bind = $mainMod, T,        exec, $terminal --title btop -e btop
bind = $mainMod, L,        exec, hyprlock
bind = $mainMod, ESCAPE,   exec, ~/.config/rofi/powermenu/type-2/powermenu.sh &
bind = $mainMod, Z, exec, hyprctl keyword device[logitech-usb-receiver]:sensitivity -0.75  # gaming
bind = $mainMod, X, exec, hyprctl keyword device[logitech-usb-receiver]:sensitivity -0.5   # normal

# Apps
bind = $mainMod, D, exec, Discord
bind = $mainMod, M, exec, spotify
bind = $mainMod, I, exec, code
bind = $mainMod, G, exec, steam
bind = $mainMod, E, exec, prismlauncher

# Clipboard history picker (Super + C)
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = ALT, 6, exec, obs-cmd -w obsws://localhost:4455/130309 replay start && notify-send "Clipping Started"
bind = ALT, 7, exec, obs-cmd -w obsws://localhost:4455/130309 replay stop && notify-send "Clipping Stopped"
bind = ALT, 8, exec, obs-cmd -w obsws://localhost:4455/130309 replay save && notify-send "Clip Saved"
 
# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
 
# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
 
# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
 
# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod SHIFT, UP,    resizeactive, 0 -20
bind = $mainMod SHIFT, DOWN,  resizeactive, 0 20
bind = $mainMod SHIFT, LEFT,  resizeactive, -20 0
bind = $mainMod SHIFT, RIGHT, resizeactive, 20 0
 
# Volume (keyboard + HyperX headset wheel)
bind   = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind   = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind   = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,  exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown,exec, brightnessctl -e4 -n2 set 5%-
 
# Media keys
bindl = , XF86AudioPlay, exec, playerctl --player=spotify play-pause
bind  = , XF86AudioNext, exec, playerctl next
bind  = , XF86AudioPrev, exec, playerctl previous
 
 
##############################
### WINDOWS AND WORKSPACES ###
##############################
 
# General rules
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
 
# Floating utilities
windowrulev2 = float,   class:^hyprland-run$
windowrulev2 = move 20 80%, class:^hyprland-run$
windowrulev2 = float,   class:^imv$
windowrulev2 = size 50% 50%, class:^imv$
windowrulev2 = center,  class:^imv$
windowrulev2 = float,   title:^btop$
windowrulev2 = maximize,title:^btop$
windowrulev2 = center,  title:^btop$
windowrulev2 = float,   title:^(nmtui)$
windowrulev2 = center,  title:^(nmtui)$
windowrulev2 = size 50% 50%, title:^(nmtui)$
windowrulev2 = float,   class:^org\.pulseaudio\.pavucontrol$
windowrulev2 = center,  class:^org\.pulseaudio\.pavucontrol$
windowrulev2 = size 800 600, class:^org\.pulseaudio\.pavucontrol$
 
# Workspace assignments
windowrulev2 = workspace 1,        class:(cs2|Minecraft.*)
windowrulev2 = workspace 2,        class:(firefox)
windowrulev2 = workspace 3,        class:(kitty)
windowrulev2 = workspace 4,        class:(steam|org\.prismlauncher\.PrismLauncher)
windowrulev2 = workspace 1 silent, class:(steam_app_.*)   # games go to 4 without stealing focus
windowrulev2 = workspace 5,        class:(spotify|discord)
 
# Steam: don't steal focus on pop-ups
windowrulev2 = noinitialfocus, class:(steam)
windowrulev2 = noinitialfocus, class:^(com\.obsproject\.Studio)$
 
# Tearing for games (lower latency on 240Hz)
windowrulev2 = immediate, class:(steam_app_.*)

# Pin workspaces to monitors
workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
